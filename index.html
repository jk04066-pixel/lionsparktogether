  if (row === 19) return seat >= 3 && seat <= 20;

        if (seat.dataset.name) {
          const newTag = seat.dataset.isNew === '1' ? ' 🆕' : '';
          tooltip.textContent = `${seat.dataset.name} · ${seat.dataset.row}열 ${seat.dataset.seatNum}번${newTag}`;
          tooltip.style.display = 'block';
        }
      });
      seat.addEventListener('mousemove', e => {
        tooltip.style.left = (e.clientX + 12) + 'px';
        tooltip.style.top = (e.clientY - 30) + 'px';
      });
      seat.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
      allSeatEls.push(seat);
      row.appendChild(seat);
    }
    sec.appendChild(row);
  });
  mapEl.appendChild(sec);
});

// Build roster
const nameSeats = {};
for (const [k, v] of Object.entries(seatMap)) {
  if (!nameSeats[v]) nameSeats[v] = [];
  const [r, s] = k.split('-');
  nameSeats[v].push({row: parseInt(r), seat: parseInt(s), isNew: newSeats.has(k)});
}
for (const n in nameSeats) nameSeats[n].sort((a, b) => a.row - b.row || a.seat - b.seat);

const sortedNames = Object.keys(nameSeats).sort((a, b) => {
  const ar = nameSeats[a][0].row, br = nameSeats[b][0].row;
  if (ar !== br) return ar - br;
  return nameSeats[a][0].seat - nameSeats[b][0].seat;
});

const rosterEl = document.getElementById('roster');
rosterEl.innerHTML = '<h3>👥 배정 명단 (클릭하여 좌석 확인)</h3>';
const grid = document.createElement('div');
grid.className = 'roster-grid';
sortedNames.forEach(name => {
  const chip = document.createElement('div');
  chip.className = 'roster-chip';
  chip.style.background = nameColor[name] || '#555';
  const seats = nameSeats[name];
  const seatStr = seats.map(s => s.row + '열' + s.seat + '번').join(', ');
  const isNewName = newNames.has(name);
  const hasNewSeat = seats.some(s => s.isNew);
  chip.innerHTML = `${name} (${seats.length})${isNewName || hasNewSeat ? '<span style="background:#ff6b35;color:#fff;font-size:7px;padding:1px 3px;border-radius:2px;margin-left:2px;">NEW</span>' : ''}`;
  chip.title = seatStr;
  chip.addEventListener('click', () => highlightName(name));
  grid.appendChild(chip);
});
rosterEl.appendChild(grid);

function highlightName(name) {
  allSeatEls.forEach(el => {
    el.style.opacity = el.dataset.name === name ? '1' : (el.dataset.name ? '0.2' : '0.1');
    el.style.transform = el.dataset.name === name ? 'scale(1.2)' : '';
    el.style.zIndex = el.dataset.name === name ? '5' : '';
  });
  document.querySelectorAll('.roster-chip').forEach(c => {
    c.classList.toggle('highlight', c.textContent.startsWith(name + ' ') || c.textContent.includes(name + ' ('));
  });
  setTimeout(() => {
    allSeatEls.forEach(el => { el.style.opacity = '1'; el.style.transform = ''; el.style.zIndex = ''; });
    document.querySelectorAll('.roster-chip').forEach(c => c.classList.remove('highlight'));
  }, 2500);
}

document.getElementById('searchInput').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) {
    allSeatEls.forEach(el => { el.style.opacity = '1'; el.style.transform = ''; });
    document.querySelectorAll('.roster-chip').forEach(c => c.classList.remove('highlight'));
    return;
  }
  allSeatEls.forEach(el => {
    const match = el.dataset.name && el.dataset.name.toLowerCase().includes(q);
    el.style.opacity = match ? '1' : '0.15';
    el.style.transform = match ? 'scale(1.15)' : '';
    el.style.zIndex = match ? '5' : '';
  });
  document.querySelectorAll('.roster-chip').forEach(c => {
    c.classList.toggle('highlight', c.textContent.toLowerCase().includes(q));
  });
});
</script>
